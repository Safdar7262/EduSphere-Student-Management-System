<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Student – Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sms-navbar fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-mortarboard-fill me-2"></i>SMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="students.html"><i class="bi bi-people me-1"></i>Students</a></li>
                <li class="nav-item"><a class="nav-link active" href="add-student.html"><i class="bi bi-person-plus me-1"></i>Add Student</a></li>
            </ul>
            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="darkModeToggle" />
                <label class="form-check-label text-white" for="darkModeToggle"><i class="bi bi-moon-fill"></i></label>
            </div>
        </div>
    </div>
</nav>

<div class="sms-wrapper">
    <aside class="sms-sidebar">
        <ul class="nav flex-column pt-3">
            <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a></li>
            <li class="nav-item"><a class="nav-link" href="students.html"><i class="bi bi-people"></i><span>All Students</span></a></li>
            <li class="nav-item"><a class="nav-link active" href="add-student.html"><i class="bi bi-person-plus"></i><span>Add Student</span></a></li>
        </ul>
    </aside>

    <main class="sms-content">
        <div class="container-fluid py-4">

            <div class="d-flex align-items-center mb-4 gap-3">
                <a href="students.html" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div>
                    <h2 class="fw-bold mb-0">Add New Student</h2>
                    <p class="text-muted mb-0">Fill in the details below</p>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-body p-4">
                    <div id="formAlert" class="alert d-none"></div>

                    <!-- Personal Info -->
                    <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">
                        <i class="bi bi-person-fill me-2"></i>Personal Information
                    </h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
                            <input type="text" id="firstName" class="form-control" placeholder="Aman" />
                            <div class="invalid-feedback" id="firstNameErr"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
                            <input type="text" id="lastName" class="form-control" placeholder="Kumar" />
                            <div class="invalid-feedback" id="lastNameErr"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                            <input type="email" id="email" class="form-control" placeholder="aman.kumar@example.com" />
                            <div class="invalid-feedback" id="emailErr"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="tel" id="phone" class="form-control" placeholder="+1234567890" />
                            <div class="invalid-feedback" id="phoneErr"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Gender <span class="text-danger">*</span></label>
                            <select id="gender" class="form-select">
                                <option value="">Select gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                            <div class="invalid-feedback" id="genderErr"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Date of Birth</label>
                            <input type="date" id="dob" class="form-control" />
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Status</label>
                            <select id="status" class="form-select">
                                <option value="ACTIVE">Active</option>
                                <option value="INACTIVE">Inactive</option>
                                <option value="SUSPENDED">Suspended</option>
                            </select>
                        </div>
                    </div>

                    <!-- Academic Info  -->
                   <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">
                        <i class="bi bi-book-fill me-2"></i>Academic Information
                    </h6>
                     <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Department <span class="text-danger">*</span></label>
                            <select id="department" class="form-select">
                                <option value="">Select department</option>
                                <option>Computer Science</option>
                                <option>Engineering</option>
                                <option>Business Administration</option>
                                <option>Mathematics</option>
                                <option>Physics</option>
                                <option>Chemistry</option>
                                <option>Biology</option>
                                <option>Arts & Humanities</option>
                                <option>Medicine</option>
                                <option>Law</option>
                            </select>
                            <div class="invalid-feedback" id="departmentErr"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Course <span class="text-danger">*</span></label>
                            <select id="course" class="form-select">
                                <option value="">Select course</option>
                                <option>B.Sc. Computer Science</option>
                                <option>B.Tech Software Engineering</option>
                                <option>BBA</option>
                                <option>MBA</option>
                                <option>B.Sc. Mathematics</option>
                                <option>B.Sc. Physics</option>
                                <option>MBBS</option>
                                <option>LLB</option>
                                <option>B.A. Literature</option>
                                <option>B.Sc. Chemistry</option>
                            </select>
                            <div class="invalid-feedback" id="courseErr"></div>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold">Semester</label>
                            <select id="semester" class="form-select">
                                <option value="">–</option>
                                <option>1</option><option>2</option><option>3</option><option>4</option>
                                <option>5</option><option>6</option><option>7</option><option>8</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold">Admission Date</label>
                            <input type="date" id="admissionDate" class="form-control" />
                        </div>
                    </div>

                    <!-- Address -->
                    <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">
                        <i class="bi bi-geo-alt-fill me-2"></i>Address
                    </h6>
                    <div class="row g-3 mb-4">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Street Address</label>
                            <input type="text" id="address" class="form-control" placeholder="123 Main St" />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">City</label>
                            <input type="text" id="city" class="form-control" />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">State</label>
                            <input type="text" id="state" class="form-control" />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Country</label>
                            <input type="text" id="country" class="form-control" />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">ZIP Code</label>
                            <input type="text" id="zipCode" class="form-control" />
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex gap-3 justify-content-end">
                        <button type="button" class="btn btn-outline-secondary px-4" onclick="clearForm()">
                            <i class="bi bi-x-circle me-1"></i>Clear
                        </button>
                        <button type="button" class="btn btn-primary px-4" onclick="submitStudent()" id="submitBtn">
                            <i class="bi bi-check-lg me-1"></i>Add Student
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast align-items-center text-white border-0">
        <div class="d-flex">
            <div class="toast-body" id="toastBody"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/student.js"></script>
</body>
</html>
